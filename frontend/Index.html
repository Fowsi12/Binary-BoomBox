<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="db/connect.js"></script>
    <script src="JS/endpoint-user.js"></script>
    <script src="JS/jsonview.js"></script>
    <script src="JS/script.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Smooch+Sans:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>Binary BoomBox</title>
  </head>

  <body>
    <script src="JS/endpoint-user.js"></script>

    <div class="sidebar">     <!-- SIDEBAR -->
      <div id="sidebarButtonPos">
        <button
          id="hjem"
          class="sidebarButton btnreact"
          onclick="window.location.href = 'index.html'">
          Hjem
        </button>
        <button
          id="senestafspillet"
          class="sidebarButton btnreact"
          onclick="window.location.href = 'html/senestafspillet.html'">
          Seneste afspillede
        </button>
        <button
          id="kø"
          class="sidebarButton btnreact"
          onclick="window.location.href = 'html/kø.html'">
          Kø
        </button>
        <button 
          id="help-btn" 
          class="sidebarButton btnreact"
          onClick="">
          Hjælp
        </button>
      </div>
    </div>

    <div id="kurv">    <!-- KURV -->
      <button
        class="cartButton btnreact"
        onclick="">
        <img src="images/cart_symbol.png" id="cart_symbol">
        <p class="cartbuttonText">Kurv</p>
      </button>
    </div>
    <!--TODO: LAV CSS TIL KURV-->

    <!-- HOVEDMENU (SØGEBAR og MENUKNAPPER) -->
    <main>
      <div class="mainCont">
        <!-- ALT I mainCont CENTRERES KORREKT I FORHOLD TIL SIDEBAR-->
        <header>
          <h1>Binary Boombox</h1>
        </header>

        <div id="search">
          <!-- SØGEBAR -->
          <input
            id="searchInput"
            type="text"
            placeholder="Søg efter album, sang, kunstner, genre..."
          />
        </div>

        <div class="hovedmenu">
          <!-- HOVEDMENU -->
          <div>
            <button class="mainbutton btnreact" onclick="showPopularSongsBox()">
              <img src="images/rocket_launch.png" class="mainButtonSymbol">
              <p class="mainButtonText">Populære sange</p>
            </button>
          </div>
          <div>
            <button class="mainbutton btnreact" onclick="showGenreBox()">
              <img src="images/genres.png" class="mainButtonSymbol">
              <p class="mainButtonText">Genre</p>
            </button>
          </div>
          <div>
            <button class="mainbutton btnreact" onclick="showSongCataBox()">
              <img src="images/library_music.png" class="mainButtonSymbol">
              <p class="mainButtonText">Sangkatalog</p>
            </button>
          </div>
          <div>
            <button class="mainbutton btnreact" id="lucky" onclick="showFeelingLuckyBox()">
              <img src="images/dice.png" class="mainButtonSymbol">
              <p class="mainButtonText">Feeling lucky?</p>
            </button>
          </div>
        </div>

        <div class="hovedmenubox" id="popularSongsBox">
          <!-- POP-UP BOXES -->
          <h2>Populære sange</h2>
          <div class="hideMainBoxButtonContent">
            <button class="hideMainBoxButton btnreact" onclick="hideAllMainBoxes()">
              <img src="images/close_cross.png"> <p>Tilbage</p>
            </button>
          </div>
          <ul>
            <li>SANG1 <button>Læg i kurv</button></li>
            <li>SANG2 <button>Læg i kurv</button></li>
            <li>SANG3 <button>Læg i kurv</button></li>
            <li>SANG4 <button>Læg i kurv</button></li>
            <li>SANG5 <button>Læg i kurv</button></li>
            <li>SANG6 <button>Læg i kurv</button></li>
          </ul>
        </div>
        <div class="hovedmenubox" id="genreBox">
          <h2>Genre</h2>
          <div class="hideMainBoxButtonContent">
            <button class="hideMainBoxButton btnreact" onclick="hideAllMainBoxes()">
              <img src="images/close_cross.png"> <p>Tilbage</p>
            </button>
          </div>
          <ul>
            <li>GENRE1</li>
            <li>GENRE2</li>
            <li>GENRE3</li>
            <li>GENRE4</li>
            <li>GENRE5</li>
            <li>GENRE6</li>
          </ul>
        </div>
        <div class="hovedmenubox" id="songCataBox">
          <h2>Sangkatalog</h2>
          <div class="hideMainBoxButtonContent">
            <button class="hideMainBoxButton btnreact" onclick="hideAllMainBoxes()">
              <img src="images/close_cross.png"> <p>Tilbage</p>
            </button>
          </div>
          <ul>
            <li>NY SANG1</li>
            <li>NY SANG2</li>
            <li>NY SANG3</li>
            <li>NY SANG4</li>
            <li>NY SANG5</li>
            <li>NY SANG6</li>
          </ul>
        </div>
        <div class="hovedmenubox" id="feelingLuckyBox">
          <h2>Feeling Lucky</h2>
          <div class="hideMainBoxButtonContent">
            <button class="hideMainBoxButton btnreact" onclick="hideAllMainBoxes()">
              <img src="images/close_cross.png"> <p>Tilbage</p>
            </button>
          </div>
          <p></p>
        </div>
      </div>
    </main>
    <!--TODO: LAV FUNKTION CALL FOR AT VISE POP UP BOXES-->

<!--
    <div id="screensaver">
      <h1>Binary BoomBox</h1>
      <p>Gør stemningen valgfri.</p>
    </div>
  -->
    <script src="JS/dvale.js"></script>
  </body>
</html>
